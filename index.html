<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arlenys Peralta</title>
</head>

<body class="bg-gradient-to-r from-pink-100 to-blue-200 text-gray-800 font-sans">

    <!-- HEADER -->
    <header id="inicio" class="text-center py-10 bg-pink-500 text-white shadow-md">
        <h1 class="text-4xl font-bold">
            Hola, soy <span class="text-blue-200">Arlenys Peralta</span>
        </h1>

        <img src="./img/image.png" alt=""
             class="w-40 h-40 rounded-full mx-auto mt-4 border-4 border-blue-400">

        <p class="text-xl mt-4">Estudiante de Ingeniería en Sistemas</p>
    </header>

    <!-- HABILIDADES -->
    <section id="habilidades" class="py-10 text-center">
        <h2 class="text-3xl font-bold mb-6 text-pink-600">Mis Habilidades</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-6">
            <div class="bg-blue-100 p-6 rounded-lg shadow hover:bg-blue-200 hover:scale-105 transition">
                <h3 class="text-xl font-bold text-blue-800">Visual Studio Code</h3>
            </div>

            <div class="bg-pink-100 p-6 rounded-lg shadow hover:bg-pink-200 hover:scale-105 transition">
                <h3 class="text-xl font-bold text-pink-800">Base de Datos</h3>
                <p>SQL Server</p>
            </div>
        </div>
    </section>

    <!-- PROYECTOS -->
    <section id="proyectos" class="py-10 bg-blue-100 text-center">
        <h2 class="text-3xl font-bold mb-6 text-blue-700">Mis Proyectos</h2>

        <div class="space-y-4">
            <div class="bg-white p-4 rounded shadow w-1/2 mx-auto border-l-4 border-pink-400">
                Sistema de Inventarios
            </div>

            <div class="bg-white p-4 rounded shadow w-1/2 mx-auto border-l-4 border-blue-400">
                Sistema de Facturación
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer id="contacto" class="bg-pink-600 text-white text-center py-6">
        <h2 class="text-2xl font-bold">Contacto</h2>
        <p class="mt-2">📧 arlennyperalta429@gmail.com</p>
        <p>📱 +1 (849) 873-8269</p>
        <p>📍 Santo Domingo, Rep. Dom.</p>
    </footer>

</body>
</html>
