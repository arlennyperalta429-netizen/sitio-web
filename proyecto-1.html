<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página</title>
    <style>
        /* Aquí va el CSS para que se vea bien */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 20px;
            max-width: 800px;
            margin: auto;
            background: white;
        }
        .boton {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>¡Bienvenidos a mi sitio Arlenys!</h1>
    </header>

    <main>
        <h2>Sobre este proyecto</h2>
        <p>Esta es una página web simple creada con <strong>HTML5</strong> y <strong>CSS3</strong>.</p>
        
        <ul>
            <li>Estructura limpia</li>
            <li>Diseño responsivo (se adapta a móviles)</li>
            <li>Fácil de editar</li>
        </ul>

        <a href="#" class="boton">¡Haz clic aquí!</a>
    </main>

</body>
</html>
